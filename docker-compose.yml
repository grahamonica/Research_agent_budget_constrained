services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["uvicorn", "backend.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    environment:
      OPEN_AI_API_KEY: ${OPEN_AI_API_KEY:-}
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/research-session
      FASTAPI_BASE_URL: http://backend:8000
      NEO4J_URI: ${NEO4J_URI:-}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-712b406a}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
    volumes:
      - ./backend:/app/backend
    depends_on:
      - n8n

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  n8n:
    image: n8nio/n8n:1.86.1
    ports:
      - "5678:5678"
    environment:
      OPEN_AI_API_KEY: ${OPEN_AI_API_KEY:-}
      RESEARCH_AGENT_TEST_MODE: ${RESEARCH_AGENT_TEST_MODE:-}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_HOST: 0.0.0.0
      N8N_SECURE_COOKIE: "false"
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - ./n8n:/workflows:ro
    entrypoint: ["/bin/sh", "/workflows/import-workflow.sh"]

volumes:
  frontend_node_modules:
